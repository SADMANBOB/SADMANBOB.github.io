name: Deploy C&G websites

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    env:
      SITE_ORIGIN: ${{ vars.CG_SITE_ORIGIN || 'https://www.cginspection.net' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            inspector-site-prototype/package-lock.json
            contractor-site-prototype/package-lock.json
      - name: Install root build dependencies
        run: npm ci
      - name: Install inspector dependencies
        run: npm ci
        working-directory: inspector-site-prototype
      - name: Install contractor dependencies
        run: npm ci
        working-directory: contractor-site-prototype
      - name: Build assembled Pages artifact
        run: npm run build
      - name: Verify assembled Pages artifact
        run: npm run verify
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
