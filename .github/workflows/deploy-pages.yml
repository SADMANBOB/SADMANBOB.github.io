name: Deploy C&G websites

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    env:
      SITE_ORIGIN: ${{ vars.CG_SITE_ORIGIN || 'https://sadmanbob.github.io' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            inspector-site-prototype/package-lock.json
            contractor-site-prototype/package-lock.json
      - name: Install inspector dependencies
        run: npm ci
        working-directory: inspector-site-prototype
      - name: Build inspector site
        run: npm run build
        working-directory: inspector-site-prototype
        env:
          VITE_BASE_PATH: /
          VITE_SITE_ORIGIN: ${{ env.SITE_ORIGIN }}
      - name: Install contractor dependencies
        run: npm ci
        working-directory: contractor-site-prototype
      - name: Build contractor site
        run: npm run build
        working-directory: contractor-site-prototype
        env:
          VITE_BASE_PATH: /contracting/
          VITE_SITE_ORIGIN: ${{ env.SITE_ORIGIN }}
      - name: Assemble Pages artifact
        run: node scripts/assemble-site.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
